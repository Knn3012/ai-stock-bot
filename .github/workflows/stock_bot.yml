name: AI Stock Bot Automation

on:
  schedule:
    # 由於 GitHub 伺服器使用的是標準「UTC時區」，與台北時間有 8 小時時差。
    # 台北時間早上 08:45 (盤前模式) ＝ UTC 時間 00:45
    - cron: '45 0 * * 1-5'
    # 台北時間中午 11:30 (盤中市價模式) ＝ UTC 時間 03:30
    - cron: '30 3 * * 1-5'
  workflow_dispatch: # 支援你在 GitHub 網頁上手動點擊「Run workflow」立刻測試

jobs:
  run-trading-system:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 檢查並複製專案程式碼
        uses: actions/checkout@v3

      - name: 🐍 安裝 Python 核心環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安裝基礎量化交易套件
        run: |
          pip install google-genai yfinance mplfinance playwright

      - name: 🌐 安裝 Playwright 瀏覽器與 Linux 核心依賴
        run: |
          playwright install chromium --with-deps

      - name: 🔤 下載繁體中文字型 (防止 Linux 執行圖表時出現中文亂碼)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: 🚀 啟動 AI 大腦並執行 CMoney 雲端自動化下單
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CMONEY_EMAIL: ${{ secrets.CMONEY_EMAIL }}
          CMONEY_PASSWORD: ${{ secrets.CMONEY_PASSWORD }}
          TZ: "Asia/Taipei" # 強制將 GitHub 虛擬機運作時區調成台北，方便 main.py 判斷模式
        run: |
          python main.py

      - name: 🌐 自動同步並部署最新網頁到 GitHub Pages 直播面板
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
