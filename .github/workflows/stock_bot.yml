name: AI Stock Match Automated Daily Run

on:
  schedule:
    # 台灣時間週一至週五早上 08:35 自動執行
    - cron: '35 0 * * 1-5' 
  workflow_dispatch: # 允許手動點擊按鈕執行測試

jobs:
  trade-match:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run AI Trading Engine
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py

    - name: Auto Commit Portfolio Database & HTML Dashboard
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # 強制將資料庫與產出的網頁檔案一同追蹤
        git add portfolio.json index.html
        
        if [ -n "$(git status --porcelain portfolio.json index.html)" ]; then
          git commit -m "🤖 系統公告：AI 今日實戰對決結束，資產與 HTML 網頁存檔 [$(date +'%Y-%m-%d')]"
          
          # 【黃金修正】推送前先拉取遠端變更，用 rebase 融合，完美避免 Rejected 報錯！
          git pull --rebase origin main
          
          git push origin main
        else
          echo "今日無資產變動，跳過存檔。"
        fi
